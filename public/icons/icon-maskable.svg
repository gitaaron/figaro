<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background (no rounded corners — maskable icons fill the whole canvas) -->
  <rect width="512" height="512" fill="#2a2018"/>
  <!-- Parchment card inset with safe-zone padding -->
  <rect x="96" y="96" width="320" height="320" rx="40" fill="#f4eee1"/>
  <!-- Decorative rules -->
  <rect x="124" y="136" width="264" height="3" rx="1.5" fill="#b2541b" opacity="0.6"/>
  <rect x="124" y="373" width="264" height="3" rx="1.5" fill="#b2541b" opacity="0.6"/>
  <!-- Letter F -->
  <text
    x="256"
    y="310"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="180"
    font-weight="bold"
    font-style="italic"
    text-anchor="middle"
    fill="#2a2018"
  >F</text>
  <!-- Terracotta dot -->
  <circle cx="256" cy="355" r="7" fill="#b2541b"/>
</svg>
